services:
  - type: web
    name: writing-solver-fe
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist/writing-solver-fe/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
