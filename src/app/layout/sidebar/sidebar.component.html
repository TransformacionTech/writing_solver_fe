<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <img class="login-app-icon" src="favicon.ico" alt="Writing Solver" />
    </div>
    @if (!collapsed()) {
    <span class="logo-text">Writing Solver</span>
    }
  </div>

  <mat-nav-list>
    @for (item of navItems; track item.route) {
    <a mat-list-item [routerLink]="item.route" routerLinkActive="active-link"
      [matTooltip]="collapsed() ? item.label : ''" matTooltipPosition="right">
      <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
      @if (!collapsed()) {
      <span matListItemTitle>{{ item.label }}</span>
      }
    </a>
    }
  </mat-nav-list>

  <mat-divider />

  <mat-nav-list class="bottom-nav">
    <a mat-list-item routerLink="/settings" routerLinkActive="active-link"
      [matTooltip]="collapsed() ? 'Configuracion' : ''" matTooltipPosition="right">
      <mat-icon matListItemIcon>settings</mat-icon>
      @if (!collapsed()) {
      <span matListItemTitle>Configuracion</span>
      }
    </a>
  </mat-nav-list>
</aside>
