<mat-toolbar class="app-header">
  <button mat-icon-button (click)="toggleSidebar.emit()">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="spacer"></span>

  <div class="header-actions">
    <button mat-icon-button class="notif-btn" [matMenuTriggerFor]="notifMenu">
      <mat-icon>notifications_none</mat-icon>
      @if (notificationService.hasNotifications()) {
        <span class="notif-dot"></span>
      }
    </button>

    <mat-menu #notifMenu="matMenu">
      @if (notificationService.notifications().length === 0) {
        <div class="empty-notifications">Sin notificaciones nuevas</div>
      } @else {
        @for (n of notificationService.notifications(); track n.id) {
          <button mat-menu-item (click)="notificationService.dismiss(n.id)">
            <mat-icon [color]="n.type === 'error' ? 'warn' : n.type === 'success' ? 'primary' : ''">
              {{ n.type === 'error' ? 'error' : n.type === 'success' ? 'check_circle' : 'info' }}
            </mat-icon>
            <span>{{ n.message }}</span>
          </button>
        }
      }
    </mat-menu>

    <button mat-button class="user-btn" [matMenuTriggerFor]="userMenu">
      @if (authService.currentUser(); as user) {
        <div class="user-avatar">{{ getInitials(user.username) }}</div>
        <span class="user-name">{{ user.username }}</span>
      } @else {
        <mat-icon>account_circle</mat-icon>
      }
    </button>

    <mat-menu #userMenu="matMenu">
      @if (authService.currentUser(); as user) {
        <div class="menu-user-info">
          <span class="menu-user-name">{{ user.username }}</span>
          <span class="menu-user-role">{{ user.roles.join(', ') }}</span>
        </div>
      }
      <mat-divider />
      <button mat-menu-item routerLink="/settings">
        <mat-icon>settings</mat-icon> Configuracion
      </button>
      <button mat-menu-item (click)="authService.logout()">
        <mat-icon>logout</mat-icon> Cerrar sesion
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
