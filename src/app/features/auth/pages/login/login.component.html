<div class="login-container">
  <div class="login-content">
    <div class="login-header">
      <img class="login-app-icon" src="favicon.ico" alt="Writing Solver" />
      <h2>Writing Solver</h2>
      <p>Genera posts de LinkedIn con agentes de IA</p>
    </div>

    <button class="github-btn" (click)="loginWithGithub()">
      <mat-icon class="github-icon">code</mat-icon>
      Iniciar sesion con GitHub
    </button>

    <p class="login-hint">Se usara tu cuenta de GitHub para autenticarte</p>
  </div>
</div>
